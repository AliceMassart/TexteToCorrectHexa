<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Formatteur de texte</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
}

textarea {
    width: 100%;
    height: 120px;
    margin-bottom: 10px;
}

button {
    padding: 10px 15px;
    cursor: pointer;
}

#resultContainer {
    margin-top: 20px;
    border: 1px solid #ccc;
}

#resultHeader {
    display: flex;
    justify-content: flex-end;
    background: #f3f3f3;
    padding: 5px;
    border-bottom: 1px solid #ccc;
}

#result {
    padding: 10px;
    white-space: pre-wrap;
    word-break: break-word;
}
</style>
</head>
<body>

<h2>Réécriture avec espace tous les 2 caractères</h2>

<textarea id="inputText" placeholder="Entrez votre texte ici"></textarea>
<br>
<button onclick="transformText()">Transformer</button>

<div id="resultContainer">
    <div id="resultHeader">
        <button onclick="copyResult()">Copier</button>
    </div>
    <div id="result"></div>
</div>

<script>
function transformText() {
    let text = document.getElementById("inputText").value;

    // Supprimer tous les espaces
    text = text.replace(/\s+/g, "");

    // Ajouter un espace tous les 2 caractères
    let formatted = text.match(/.{1,2}/g)?.join(" ") || "";

    document.getElementById("result").textContent = formatted;
}

function copyResult() {
    const text = document.getElementById("result").textContent;
    navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
